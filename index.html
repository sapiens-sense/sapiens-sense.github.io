<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sapiens Sense</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <style>
        /* Referencing your local font.ttf from the root */
        @font-face {
            font-family: 'MainFont';
            src: url('font.ttf') format('truetype');
            font-display: swap;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Background Image from root with dark overlay */
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                        url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #f8fafc;
            font-family: 'MainFont', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 60px 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .profile-logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid #38bdf8;
            background-color: #1e293b;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        header p {
            color: #cbd5e1;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .links-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-card {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(5px);
            padding: 16px;
            border-radius: 16px;
            text-decoration: none;
            color: #f8fafc;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(51, 65, 85, 0.5);
            display: block;
        }

        .link-card:hover {
            transform: translateY(-2px);
            background: #334155;
            border-color: #38bdf8;
        }

        /* Styling for the Founder link within the group */
        .founder-btn {
            background: rgba(56, 189, 248, 0.1);
        }

        .label {
            display: block;
            font-size: 1rem;
            text-transform: uppercase;
            color: #38bdf8;
            margin-top: 4rem;
            margin-bottom: 4px;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.jpg" alt="Sapiens Sense Logo" class="profile-logo">

        <header>
            <h1>Sapiens Sense</h1>
            <p>🧠🧠🧠</p>
        </header>

        <nav class="links-group">
            <a href="mailto:sapienssense@tutamail.com" class="link-card">sapienssense@tutamail.com</a>
            <a href="https://discord.com/invite/rmUwXbXm" class="link-card">Discord</a>
            <a href="https://www.youtube.com/@sapienssense" class="link-card">YouTube</a>
            <a href="https://medium.com/@sapienssense" class="link-card">Medium</a>
            <a href="https://www.instagram.com/sapienssense" class="link-card">Instagram</a>
            <a href="https://www.facebook.com/sapienssense" class="link-card">Facebook</a>
            <a href="https://x.com/Sapiens_Sense" class="link-card">X (Twitter)</a>
            <a href="https://www.threads.com/@sapienssense" class="link-card">Threads</a>
            <span class="label">Founder</span>
            <a href="https://mrriyaj.uddinmondal.in/" class="link-card founder-btn">
                Riyajuddin Mondal
            </a>
        </nav>
    </div>

</body>
</html>
