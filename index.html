<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sapiens Sense</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <style>
        /* 1. Define the custom font */
        @font-face {
            font-family: 'MyCustomFont';
            src: url('font.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 2. Layout & Background */
        body {
            font-family: 'MyCustomFont', sans-serif;
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #ffffff;
        }

        /* 3. The Glass Card */
        .glass-card {
            background: rgba(0, 0, 0, 0.45); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 30px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.18);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .profile-logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        h1 {
            color: #ffffff;
            margin-bottom: 8px;
            font-size: 28px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .tagline {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .link-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.08);
            padding: 14px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-family: 'MyCustomFont', sans-serif;
        }

        .btn:hover {
            background: #ffffff;
            color: #000000;
            transform: scale(1.03);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .label {
            display: block;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 25px;
            margin-bottom: 8px;
            letter-spacing: 0.1em;
        }

        .founder-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <img src="logo.jpg" alt="Sapiens Sense Logo" class="profile-logo">
        
        <header>
            <h1>Sapiens Sense</h1>
            <p class="tagline">🧠🧠🧠</p>
        </header>

        <div class="link-container">
            <a href="mailto:sapienssense@tutamail.com" class="btn">sapienssense@tutamail.com</a>
            <a href="https://discord.com/invite/rmUwXbXm" class="btn">Discord</a>
            <a href="https://www.youtube.com/@sapienssense" class="btn">YouTube</a>
            <a href="https://medium.com/@sapienssense" class="btn">Medium</a>
            <a href="https://www.instagram.com/sapienssense" class="btn">Instagram</a>
            <a href="https://www.facebook.com/sapienssense" class="btn">Facebook</a>
            <a href="https://x.com/Sapiens_Sense" class="btn">X (Twitter)</a>
            <a href="https://www.threads.com/@sapienssense" class="btn">Threads</a>
            
            <span class="label">Founder</span>
            <a href="https://mrriyaj.uddinmondal.in/" class="btn founder-btn">
                Riyajuddin Mondal
            </a>
        </div>
    </div>

</body>
</html>
